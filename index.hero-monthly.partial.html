<div class="hero-monthly">
  <div class="hero-monthly__media">
    <img
      hero-monthly__media-img
      src="./img/monthly-item1.png"
      alt="Monthy item 1"
    />
  </div>
  <div class="hero-monthly__content">
    <h2 class="hero-monthly__title">special offer of the month</h2>
    <p class="hero-monthly__text">Black long sleeve</p>

    <ul class="hero-monthly__prices">
      <li class="hero-monthly__price-item">
        <span class="hero-monthly__price-old">$105</span>
      </li>
      <li class="hero-monthly__price-item">
        <span class="hero-monthly__price-new">$65</span>
      </li>
      <li class="hero-monthly__price-item">
        <a href="#" class="button-shop button-shop--monthly">shop now</a>
      </li>
    </ul>

    <ul class="hero-monthly__time">
      <li class="hero-monthly__time-item">
        <span class="hero-monthly__time-number">09 h.</span>
        <span class="hero-monthly__time-delim">...</span>
        <span class="hero-monthly__time-text">hours</span>
      </li>
      <li class="hero-monthly__time-item">
        <span class="hero-monthly__time-number">56 m.</span>
        <span class="hero-monthly__time-delim">...</span>
        <span class="hero-monthly__time-text">minutes</span>
      </li>
      <li class="hero-monthly__time-item">
        <span class="hero-monthly__time-number">11 s.</span>
        <span class="hero-monthly__time-delim">...</span>
        <span class="hero-monthly__time-text">seconds</span>
      </li>
    </ul>
  </div>
</div>
