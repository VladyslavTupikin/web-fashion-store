<div class="hero-slider">
  <div class="hero-slider__slide">
    <img src="./img/slide1.png" alt="Slide1" />
  </div>

  <div class="hero-slider__body">
    <h1 class="hero-slider__title">summer collection</h1>

    <div class="hero-slider__controls">
      <button class="hero-slider__button hero-slider__button--prev">
        prev
      </button>
      <button class="hero-slider__button hero-slider__button--next">
        next
      </button>
    </div>

    <div class="hero-slider__meta">
      <span class="hero-slider__meta-index">01</span>
      <span class="hero-slider__meta-label">men's wear</span>
    </div>

    <ul class="hero-slider__actions">
      <li class="hero-slider__action-item">
        <button class="hero-slider__button hero-slider__button--next">→</button>
      </li>
      <li class="hero-slider__action-item">
        <button class="hero-slider__button hero-slider__button--like">
          heart
        </button>
      </li>
      <li class="hero-slider__action-item">
        <button class="hero-slider__button hero-slider__button--share">
          share
        </button>
      </li>
    </ul>

    <span class="hero-slider__text-primary">
      Lorem ipsum dolor sitamet, consectetur adipiscing elit.
    </span>

    <span class="hero-slider__text-secondary">
      Vivamus sed fermentum nibh, vel aliquet massa. Etiam in magna id risus
      lacinia luctus eget eu est.
    </span>

    <a href="#" class="button-shop button-shop--hero">shop now</a>

    <div class="monthly-desktop">
      <div
        data-hx-trigger="load"
        data-hx-swap="outerHTML"
        data-hx-get="index.hero-monthly.partial.html"
      ></div>
    </div>
  </div>
</div>
